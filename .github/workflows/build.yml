name: Build

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to attach binaries to (e.g. v1.2.1). Leave blank to only build artifacts."
        required: false
        default: ""
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os-label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            os-label: Windows
            artifact-name: SunoJump.exe
            binary-path: dist/SunoJump.exe
          - os: macos-latest
            os-label: macOS
            artifact-name: SunoJump-macOS
            binary-path: dist/SunoJump
          - os: ubuntu-latest
            os-label: Linux
            artifact-name: SunoJump-Linux
            binary-path: dist/SunoJump
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Linux system deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libxkbcommon0 libdbus-1-3 libgl1 libxcb-cursor0 libxcb-xinerama0

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Build with PyInstaller
        run: >
          pyinstaller --onefile --windowed --name SunoJump
          --collect-submodules PyQt6.QtMultimedia
          --clean --noconfirm sunojump.py

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.binary-path }}
          if-no-files-found: error

      - name: Attach to Release
        if: github.event_name == 'push' || inputs.tag != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${{ inputs.tag }}"
          if [ -z "$TAG" ]; then
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "Uploading ${{ matrix.binary-path }} to release $TAG"
          gh release upload "$TAG" "${{ matrix.binary-path }}" --clobber
