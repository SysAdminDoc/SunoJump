name: Build

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to attach binaries to (e.g. v1.2.1). Leave blank to only build artifacts."
        required: false
        default: ""
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os-label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            os-label: Windows
            artifact-name: SunoJump.exe
            binary-path: dist/SunoJump.exe
            release-name: SunoJump.exe
          - os: macos-latest
            os-label: macOS
            artifact-name: SunoJump-macOS
            binary-path: dist/SunoJump
            release-name: SunoJump-macOS
          - os: ubuntu-latest
            os-label: Linux
            artifact-name: SunoJump-Linux
            binary-path: dist/SunoJump
            release-name: SunoJump-Linux
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Linux system deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libxkbcommon0 libdbus-1-3 libgl1 libxcb-cursor0 libxcb-xinerama0

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Build with PyInstaller
        run: >
          pyinstaller --onefile --windowed --name SunoJump
          --collect-submodules PyQt6.QtMultimedia
          --clean --noconfirm sunojump.py

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.binary-path }}
          if-no-files-found: error

      - name: Attach to Release
        if: github.event_name == 'push' || inputs.tag != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${{ inputs.tag }}"
          if [ -z "$TAG" ]; then
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          # Idempotent: create the release if it doesn't exist yet. This
          # handles the case where a tag push triggers CI before the release
          # has been created manually (race between `git push --tags` and
          # `gh release create`). --generate-notes pulls from git log.
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG does not exist yet; creating."
            gh release create "$TAG" --title "$TAG" --generate-notes || {
              # Another matrix job may have created it between our check and
              # create -- that's fine, proceed to upload.
              echo "Create failed (likely race with another matrix job); retrying view."
              sleep 2
              gh release view "$TAG" >/dev/null 2>&1 || exit 1
            }
          fi
          # Rename the binary so macOS and Linux don't collide on upload
          # (both build dist/SunoJump, which would upload as the same asset
          # name). Windows binary is already uniquely named .exe.
          SRC="${{ matrix.binary-path }}"
          DEST_NAME="${{ matrix.release-name }}"
          DEST_DIR="$(dirname "$SRC")"
          if [ "$(basename "$SRC")" != "$DEST_NAME" ]; then
            cp "$SRC" "$DEST_DIR/$DEST_NAME"
            SRC="$DEST_DIR/$DEST_NAME"
          fi
          echo "Uploading $SRC to release $TAG as $DEST_NAME"
          gh release upload "$TAG" "$SRC" --clobber
